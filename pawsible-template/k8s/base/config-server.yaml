apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: pawsible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: YOUR_ECR_REGISTRY/pawsible/config-server:1.0.0
        ports:
        - containerPort: 8888
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: pawsible
spec:
  selector:
    app: config-server
  ports:
  - port: 8888
    targetPort: 8888
