apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: pawsible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      containers:
      - name: admin-server
        image: 268015775379.dkr.ecr.us-east-1.amazonaws.com/pawsible/admin-server:1.0.0
        ports:
        - containerPort: 9090
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-server
  namespace: pawsible
spec:
  selector:
    app: admin-server
  ports:
  - port: 9090
    targetPort: 9090
