apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
  namespace: pawsible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      containers:
      - name: customers-service
        image: YOUR_ECR_REGISTRY/pawsible/customers-service:1.0.0
        ports:
        - containerPort: 8081
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: customers-service
  namespace: pawsible
spec:
  selector:
    app: customers-service
  ports:
  - port: 8081
    targetPort: 8081
