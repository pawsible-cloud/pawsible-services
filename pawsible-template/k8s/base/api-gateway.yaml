apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pawsible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: YOUR_ECR_REGISTRY/pawsible/api-gateway:1.0.0
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pawsible
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
