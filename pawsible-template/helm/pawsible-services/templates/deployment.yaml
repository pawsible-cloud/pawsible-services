{{- range $key, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $service.name }}
    version: {{ $.Chart.AppVersion }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      app: {{ $service.name }}
  template:
    metadata:
      labels:
        app: {{ $service.name }}
        version: {{ $.Chart.AppVersion }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $service.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      containers:
      - name: {{ $service.name }}
        image: {{ $.Values.registry.account }}.dkr.ecr.{{ $.Values.registry.region }}.amazonaws.com/{{ $.Values.registry.repository }}/{{ $service.image }}:{{ $.Values.defaultImage.tag }}
        imagePullPolicy: {{ $.Values.defaultImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ $service.port }}
          protocol: TCP
        {{- if $service.env }}
        env:
          {{- toYaml $service.env | nindent 10 }}
        {{- end }}
        {{- if $.Values.healthCheck.enabled }}
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: {{ $.Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ $.Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
          failureThreshold: {{ $.Values.healthCheck.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: {{ $.Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ $.Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
          failureThreshold: {{ $.Values.healthCheck.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml $service.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
{{- end }}
