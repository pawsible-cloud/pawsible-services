services:
  configServer:
    name: config-server
    replicas: 1
    image: config-server
    port: 8888
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  discoveryServer:
    name: discovery-server
    replicas: 1
    image: discovery-server
    port: 8761
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  apiGateway:
    name: api-gateway
    replicas: 1
    image: api-gateway
    port: 8080
    env: []
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  customersService:
    name: customers-service
    replicas: 1
    image: customers-service
    port: 8081
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  visitsService:
    name: visits-service
    replicas: 1
    image: visits-service
    port: 8082
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  vetsService:
    name: vets-service
    replicas: 1
    image: vets-service
    port: 8083
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  genaiService:
    name: genai-service
