    image: genai-service
    port: 8084
    env: []
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  adminServer:
    name: admin-server
    replicas: 1
    image: admin-server
    port: 9090
    env: []
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
