name: Build and Deploy to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 268015775379
  REGISTRY: 268015775379.dkr.ecr.us-east-1.amazonaws.com
  REGISTRY_ALIAS: pawsible

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - service: admin-server
            artifact: spring-petclinic-admin-server
            port: 9090
          - service: api-gateway
            artifact: spring-petclinic-api-gateway
            port: 8080
          - service: config-server
            artifact: spring-petclinic-config-server
            port: 8888
          - service: customers-service
            artifact: spring-petclinic-customers-service
            port: 8081
          - service: discovery-server
            artifact: spring-petclinic-discovery-server
            port: 8761
          - service: genai-service
            artifact: spring-petclinic-genai-service
            port: 8084
          - service: vets-service
            artifact: spring-petclinic-vets-service
            port: 8083
          - service: visits-service
            artifact: spring-petclinic-visits-service
            port: 8082

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image for ${{ matrix.service }}
        working-directory: pawsible-template
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ALIAS }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ALIAS }}/${{ matrix.service }}:latest \
            --build-arg ARTIFACT_NAME=${{ matrix.artifact }} \
            --build-arg EXPOSED_PORT=${{ matrix.port }} \
            --build-arg SERVICE_DIR=${{ matrix.artifact }} \
            -f docker/Dockerfile.multistage .
          
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ALIAS }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ALIAS }}/${{ matrix.service }}:latest

  update-helm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write        # <-- THIS is the fix: allow push to repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update Helm values with new image tag
        run: |
          sed -i 's/tag: ".*"/tag: "${{ github.sha }}"/g' pawsible-template/helm/pawsible-services/values.yaml
          cat pawsible-template/helm/pawsible-services/values.yaml | grep tag

      - name: Commit and push updated values
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pawsible-template/helm/pawsible-services/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push origin main
